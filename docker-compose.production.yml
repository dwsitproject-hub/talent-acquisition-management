version: '3.8'

# Copy to your server and create .env.production with all secrets (see ENV_SETUP_INSTRUCTIONS.md).
# Required .env.production variables: DATABASE_URL, JWT_SECRET, JWT_REFRESH_SECRET,
# ENCRYPTION_KEY, REDIS_PASSWORD, DOCKERHUB_USERNAME, IMAGE_TAG, FRONTEND_URL,
# CANDIDATE_PORTAL_URL, API_BASE_URL, CORS_ORIGIN

services:
  backend:
    image: ${DOCKERHUB_USERNAME:-your-dockerhub-username}/tas-backend:${IMAGE_TAG:-1.0.0}
    container_name: tas_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      # General
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: info

      # URLs - set in .env.production
      FRONTEND_URL: ${FRONTEND_URL:-https://admin.example.com}
      CANDIDATE_PORTAL_URL: ${CANDIDATE_PORTAL_URL:-https://careers.example.com}
      API_BASE_URL: ${API_BASE_URL:-https://api.example.com}

      # Database - set DATABASE_URL in .env.production (never commit real values)
      # Format: postgresql://<DB_USER>:<DB_PASSWORD>@<DB_HOST>:5432/tas_db?schema=public&pool_timeout=0&connection_limit=20
      DATABASE_URL: ${DATABASE_URL}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-your-redis-password-here}

      # JWT & Encryption - generate and set in .env.production only
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-https://admin.example.com,https://careers.example.com}
      CORS_CREDENTIALS: "true"

      # Security / Rate Limits
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      RATE_LIMIT_LOGIN_MAX: 200
      ACCOUNT_LOCKOUT_THRESHOLD: 5

      # File Uploads
      MAX_FILE_SIZE: 10485760
      ALLOWED_FILE_TYPES: pdf,doc,docx,jpg,jpeg,png,xls,xlsx
      UPLOAD_DIR: ./uploads
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    depends_on:
      - redis
    networks:
      - tas_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ${DOCKERHUB_USERNAME:-your-dockerhub-username}/tas-frontend:${IMAGE_TAG:-1.0.0}
    container_name: tas_frontend
    restart: unless-stopped
    ports:
      - "4001:3000"
    environment:
      NODE_ENV: production
    networks:
      - tas_network

  candidate-portal:
    image: ${DOCKERHUB_USERNAME:-your-dockerhub-username}/tas-candidate-portal:${IMAGE_TAG:-1.0.0}
    container_name: tas_candidate_portal
    restart: unless-stopped
    ports:
      - "4002:3000"
    environment:
      NODE_ENV: production
    networks:
      - tas_network

  redis:
    image: redis:7-alpine
    container_name: tas_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-your-redis-password-here}
    volumes:
      - redis_data:/data
    networks:
      - tas_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local

networks:
  tas_network:
    driver: bridge
